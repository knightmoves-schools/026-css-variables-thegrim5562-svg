<html>

<head>
    <title>CSS Variables</title>
    <style>
        :root {
            --wide-text-size: 200px;
            --narrow-text-size: 150px;
        }
        
        .narrow-text-size {
            width: 120px;
            border-style: solid;
            padding: 10px;
        }

        .wide-text-size {
            width: 150px;
            border-style: solid;
            padding: 10px;
        }
    </style>
</head>

<body>
    <div class="narrow-text-size">
        Lorem ipsum dolor sit amet. 
        Ut quam nihil hic.
    </div>
    <div class="wide-text-size">
        Lorem ipsum dolor sit amet. 
        Ut quam nihil hic.
    </div>
</body>

</html>
